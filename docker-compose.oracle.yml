version: '3.8'

services:
  # Frontend - Nginx serving React build
  frontend:
    image: nginx:alpine
    container_name: hmif-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.oracle.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - hmif-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend - Express.js API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hmif-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CHATBOT_SERVICE_URL=http://chatbot:8000
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs/backend:/app/logs
    networks:
      - hmif-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Chatbot - Python FastAPI
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.chatbot
    container_name: hmif-chatbot
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - ./logs/chatbot:/app/logs
    networks:
      - hmif-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hmif-network:
    driver: bridge

volumes:
  uploads:
  logs:
