version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: hmif-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: hmif-platform
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - hmif-network

  # Backend Express API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hmif-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/hmif-platform
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CHATBOT_SERVICE_URL=http://chatbot:8000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - hmif-network
    volumes:
      - ../uploads:/app/uploads

  # Chatbot FastAPI Service
  chatbot:
    build:
      context: ./chatbot-api
      dockerfile: Dockerfile
    container_name: hmif-chatbot
    restart: always
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "8000:8000"
    networks:
      - hmif-network

  # Frontend Static Site (served via Nginx)
  frontend:
    image: nginx:alpine
    container_name: hmif-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - hmif-network

volumes:
  mongodb_data:

networks:
  hmif-network:
    driver: bridge
